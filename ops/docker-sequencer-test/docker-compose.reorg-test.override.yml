version: '3.8'
# Reorg restart loop integration test override.
# Enables the MORPH_TEST_REORG_RESTART_INTERVAL hook on node-1 (PBFT validator
# pre-upgrade, V2 fullnode post-upgrade). The hook periodically calls
# Node.testStartStopWhenReorg() which exercises the StopForReorg +
# SwitchToBlockSyncFromReorg path on the blocksync reactor. The test target
# must be a non-HA node (the hook is a no-op on HA-enabled nodes).
#
# Stack with:
#   docker compose \
#     -f docker-compose-4nodes.yml \
#     -f docker-compose.override.yml \
#     -f docker-compose.ha-override.yml \
#     -f docker-compose.reorg-test.override.yml \
#     up -d
#
# Verification:
#   - node-1 logs:    docker logs node-1 2>&1 | grep '\[REORG_TEST\]'
#   - block growth:   curl http://localhost:8645 (eth_blockNumber must increase)
#   - cluster:        ha-geth block heights remain in sync with node-1
services:
  node-1:
    environment:
      - MORPH_TEST_REORG_RESTART_INTERVAL=120s
